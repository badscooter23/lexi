<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexi Prompt Manager</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #11182c;
      --muted: #9fb3c8;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --text: #e2e8f0;
      --border: #1f2937;
      --success: #22c55e;
      --danger: #ef4444;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.18), transparent 35%),
                  radial-gradient(circle at 90% 10%, rgba(6, 182, 212, 0.18), transparent 30%),
                  var(--bg);
      color: var(--text);
    }
    * { box-sizing: border-box; }
    body {
      margin: 5px;
      min-height: calc(100vh - 10px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .shell {
      width: 100%;
      height: calc(100vh - 10px);
      background: rgba(17, 24, 44, 0.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 30px 120px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
    }
    header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .status {
      font-size: 0.95rem;
      color: var(--muted);
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 14px;
      border-radius: 10px 10px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: #0f172a;
      cursor: pointer;
      font-weight: 700;
      color: var(--muted);
    }
    .tab.active {
      color: var(--text);
      background: rgba(20, 28, 48, 0.95);
    }
    .content {
      display: none;
      padding: 20px 24px 24px;
      overflow: auto;
      flex: 1 1 auto;
    }
    .content.active { display: block; }
    .prompts-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .prompts-grid { grid-template-columns: 1fr; }
    }
    .panel {
      background: rgba(20, 28, 48, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 12px;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f172a;
      color: var(--text);
      font-size: 1rem;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.4;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      color: #0b1020;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1020;
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.3);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #0f172a;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.95rem;
    }
    .data-table th, .data-table td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
    }
    .data-table th {
      background: #11182c;
      color: var(--muted);
      font-weight: 700;
    }
    .data-table tr:nth-child(every) {
      background: #0f172a;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .active {
      color: var(--success);
      border-color: var(--success);
    }
    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .prompt-body {
      white-space: pre-wrap;
      color: #dce3f5;
      margin: 4px 0;
    }
    .params {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .inline-field {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    .inline-field input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    .provider-list {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 10px 0;
    }
    .provider-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #0f172a;
      color: var(--text);
      font-size: 0.95rem;
    }
    .provider-pill input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    .provider-pill span {
      font-weight: 500;
    }
    .provider-pill input[type="checkbox"]:checked + span {
      font-weight: 700;
    }
    .response-tabs {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .response-tab {
      padding: 8px 12px;
      border-radius: 10px 10px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: #0f172a;
      cursor: pointer;
      color: var(--muted);
    }
    .response-tab.active {
      color: var(--text);
      background: rgba(20, 28, 48, 0.95);
    }
    .response-body {
      border: 1px solid var(--border);
      border-radius: 0 10px 10px 10px;
      padding: 12px;
      background: #0f172a;
      min-height: 120px;
      color: var(--text);
      white-space: pre-wrap;
    }
    .cli-log {
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #0f172a;
      color: var(--muted);
      font-size: 0.95rem;
      white-space: pre-wrap;
      display: none;
      max-width: 360px;
    }
  </style>
</head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>Lexi</h1>
          <p>Multi-provider client for generative AI...</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px; min-width:260px;">
          <div class="status" id="status">Ready</div>
          <button class="btn btn-ghost" id="toggleCliLog">Show CLI Actions</button>
          <div class="cli-log" id="cliLog"></div>
        </div>
      </header>
      <div class="tabs">
        <div class="tab active" data-tab="chat">Chat</div>
        <div class="tab" data-tab="prompts">Prompts</div>
        <div class="tab" data-tab="providers">Providers</div>
      </div>
    <div class="content" id="tab-prompts">
      <div class="prompts-grid">
        <section class="panel">
          <h2>Create or Update Prompt</h2>
          <label for="name">Prompt name (leave blank to use active prompt $$)</label>
          <input id="name" type="text" placeholder="e.g., joke, summary, $$ for active">

          <label for="prompt">Prompt text</label>
          <textarea id="prompt" placeholder="Write the prompt here..."></textarea>

          <div class="field-grid">
            <div>
              <label for="maxTokens">Max tokens</label>
              <input id="maxTokens" type="number" min="1" placeholder="uses CLI default">
            </div>
            <div>
              <label for="temperature">Temperature</label>
              <input id="temperature" type="number" step="0.1" min="0" max="2" placeholder="uses CLI default">
            </div>
            <div>
              <label for="role">Role</label>
              <input id="role" type="text" placeholder="uses CLI default">
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="saveActive">Save as Active ($$)</button>
            <button class="btn btn-ghost" id="saveNamed">Save Named Prompt</button>
          </div>
        </section>

        <section class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <h2>Saved Prompts</h2>
            <button class="btn btn-ghost" id="refresh">Refresh</button>
          </div>
          <div class="inline-field">
            <input type="checkbox" id="showDetails">
            <label for="showDetails" style="margin:0;">Show parameters</label>
          </div>
          <div class="list" id="promptList">
            <div class="muted">No prompts loaded yet.</div>
          </div>
        </section>
      </div>
    </div>
    <div class="content active" id="tab-chat">
      <section class="panel">
        <label for="chatPrompt">Prompt</label>
        <textarea id="chatPrompt" placeholder="Enter prompt"></textarea>
        <div class="inline-field" style="justify-content: space-between; align-items: center;">
          <div style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="useActivePrompt">
            <label for="useActivePrompt" style="margin:0;">Use Active Prompt</label>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="btn btn-ghost" id="saveChatNamed" style="display:none;">Save</button>
            <button class="btn btn-ghost" id="saveChatPrompt" style="display:none;">Save to Active</button>
          </div>
        </div>
        <div class="provider-list" id="providerList">
          <span class="muted" style="font-size:0.95rem;">Providers:</span>
        </div>
        <label>Response</label>
        <div class="response-tabs" id="responseTabs"></div>
        <div class="response-body" id="responseBody">Select providers to view responses.</div>
      </section>
    </div>
    <div class="content" id="tab-providers">
      <section class="panel">
        <h2>Providers</h2>
        <div class="muted">Under construction.</div>
      </section>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const promptEl = document.getElementById('prompt');
    const nameEl = document.getElementById('name');
    const maxTokensEl = document.getElementById('maxTokens');
    const temperatureEl = document.getElementById('temperature');
    const roleEl = document.getElementById('role');
    const listEl = document.getElementById('promptList');
    const showDetailsEl = document.getElementById('showDetails');
    const chatPromptEl = document.getElementById('chatPrompt');
    const useActivePromptEl = document.getElementById('useActivePrompt');
    const saveChatPromptBtn = document.getElementById('saveChatPrompt');
    const saveChatNamedBtn = document.getElementById('saveChatNamed');
    const providerListEl = document.getElementById('providerList');
    const responseTabsEl = document.getElementById('responseTabs');
    const responseBodyEl = document.getElementById('responseBody');
    const providersTabEl = document.getElementById('tab-providers');
    const providerTableEl = document.createElement('div');
    providerTableEl.id = 'providerTable';
    providersTabEl.querySelector('.panel').appendChild(providerTableEl);
    const PROVIDERS = ['OpenAI', 'Anthropic', 'Gemini', 'NVIDIA'];
    const cliLogEl = document.getElementById('cliLog');
    const toggleCliLogBtn = document.getElementById('toggleCliLog');
    let showCliLog = false;
    let lexiPrompt = 'lexi>';

    function setStatus(text, tone = 'muted') {
      statusEl.textContent = text;
      statusEl.style.color = tone === 'error' ? '#ef4444' : tone === 'success' ? '#22c55e' : 'var(--muted)';
    }

    function renderProviderSelector() {
      providerListEl.innerHTML = '<span class="muted" style="font-size:0.95rem;">Providers:</span>';
      PROVIDERS.forEach((name, idx) => {
        const id = `provider-${idx}`;
        const pill = document.createElement('label');
        pill.className = 'provider-pill';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.id = id;
        input.value = name;
        input.checked = name === 'OpenAI';
        input.addEventListener('change', renderResponses);
        const span = document.createElement('span');
        span.textContent = name;
        pill.appendChild(input);
        pill.appendChild(span);
        providerListEl.appendChild(pill);
      });
      renderResponses();
    }

    function getSelectedProviders() {
      return Array.from(providerListEl.querySelectorAll('input[type="checkbox"]:checked')).map((el) => el.value);
    }

    function renderResponses() {
        const providers = getSelectedProviders();
        if (!providers.length) {
          responseTabsEl.innerHTML = '';
          responseBodyEl.textContent = 'Select providers to view responses.';
          return;
        }
        if (providers.length === 1) {
          responseTabsEl.innerHTML = `<div class="response-tab active">${providers[0]}</div>`;
          responseBodyEl.textContent = `(${providers[0]}) No response yet.`;
          return;
        }
        responseTabsEl.innerHTML = '';
        providers.forEach((name, idx) => {
          const tab = document.createElement('div');
          tab.className = `response-tab ${idx === 0 ? 'active' : ''}`;
          tab.textContent = name;
          tab.addEventListener('click', () => {
            Array.from(responseTabsEl.children).forEach((t) => t.classList.remove('active'));
            tab.classList.add('active');
            responseBodyEl.textContent = `(${name}) No response yet.`;
          });
          responseTabsEl.appendChild(tab);
        });
        responseBodyEl.textContent = `(${providers[0]}) No response yet.`;
    }

    async function fetchProvidersList() {
      try {
        const data = await api('/api/providers');
        renderProvidersTable(data.providers || [], data.source);
      } catch (err) {
        providerTableEl.innerHTML = `<div class="muted">Failed to load providers: ${err.message}</div>`;
      }
    }

    function renderProvidersTable(items, source) {
      if (!items.length) {
        providerTableEl.innerHTML = '<div class="muted">No providers found.</div>';
        return;
      }
      const table = document.createElement('table');
      table.className = 'data-table';
      const thead = document.createElement('thead');
      thead.innerHTML = `<tr><th>Name</th><th>URL</th><th>Hosted Path</th><th>Fields</th><th>Default Model</th><th>Key</th></tr>`;
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      items.forEach((p) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.name}</td>
          <td>${p.url || ''}</td>
          <td>${p.hosted_models || ''}</td>
          <td>${(p.hosted_model_fields || []).join(', ')}</td>
          <td>${p.default_model || ''}</td>
          <td>${p.api_key || ''}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      providerTableEl.innerHTML = '';
      const heading = document.createElement('div');
      heading.className = 'muted';
      heading.style.marginBottom = '8px';
      heading.textContent = source ? `Source: ${source}` : 'Providers';
      providerTableEl.appendChild(heading);
      providerTableEl.appendChild(table);
    }

    async function api(path, options = {}) {
      const init = { headers: { 'Content-Type': 'application/json' }, ...options };
      if ((init.method || 'GET') === 'GET') {
        delete init.body;
      }
      const res = await fetch(path, init);
      const cliHeader = res.headers.get('X-Lexi-Command');
      const promptHeader = res.headers.get('X-Lexi-Prompt');
      if (promptHeader) {
        lexiPrompt = promptHeader;
        if (!showCliLog) {
          toggleCliLogBtn.textContent = 'Show CLI Actions';
        } else {
          toggleCliLogBtn.textContent = lexiPrompt;
        }
      }
      if (showCliLog && cliHeader) {
        cliLogEl.style.display = 'block';
        cliLogEl.textContent = cliHeader;
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = data.error || res.statusText || 'Request failed';
        throw new Error(msg + (data.details ? `: ${data.details}` : ''));
      }
      return data;
    }

    function renderPrompts(prompts) {
      listEl.innerHTML = '';
      if (!prompts.length) {
        listEl.innerHTML = '<div class="muted">No prompts saved.</div>';
        return;
      }
      const detailed = showDetailsEl.checked;
      const sorted = [...prompts].sort((a, b) => (b.isActive ? 1 : 0) - (a.isActive ? 1 : 0));
      for (const p of sorted) {
        const card = document.createElement('div');
        card.className = 'card';
        const header = document.createElement('div');
        header.className = 'card-header';
        const title = document.createElement('div');
        title.className = 'card-title';
        if (p.isActive) {
          const badge = document.createElement('span');
          badge.className = 'badge active';
          badge.textContent = 'Active ($$)';
          title.appendChild(badge);
        } else {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = p.name;
          title.appendChild(badge);
        }
        const actions = document.createElement('div');
        actions.className = 'actions';
        actions.style.marginTop = '0';
        const activateBtn = document.createElement('button');
        activateBtn.className = 'btn btn-ghost';
        activateBtn.textContent = 'Set Active';
        activateBtn.onclick = () => setActive(p.name);
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn btn-danger';
        deleteBtn.textContent = 'Delete';
        deleteBtn.onclick = () => deletePrompt(p.name);
        actions.appendChild(activateBtn);
        if (!p.isActive) actions.appendChild(deleteBtn);
        header.appendChild(title);
        header.appendChild(actions);
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'prompt-body';
        body.textContent = p.prompt || '(empty prompt)';
        card.appendChild(body);

        if (detailed) {
          const params = document.createElement('div');
          params.className = 'params';
          params.textContent = `max_tokens=${p.max_tokens ?? 'default'} • temperature=${p.temperature ?? 'default'} • role=${p.role || 'default'}`;
          card.appendChild(params);
        }

        listEl.appendChild(card);
      }
    }

    async function loadPrompts() {
      setStatus('Loading prompts...');
      try {
        const data = await api('/api/prompts', { method: 'GET' });
        const prompts = data.prompts || [];
        renderPrompts(prompts);
        // Update chat prompt if using active
        if (useActivePromptEl.checked) {
          const active = prompts.find((p) => p.isActive);
          if (active) {
            chatPromptEl.value = active.prompt || '';
            setStatus('Loaded active prompt');
            saveChatPromptBtn.classList.add('btn-ghost');
            saveChatPromptBtn.classList.remove('btn-primary');
            saveChatPromptBtn.disabled = true;
          } else {
            chatPromptEl.value = '';
            setStatus('No active prompt set');
            saveChatPromptBtn.classList.add('btn-ghost');
            saveChatPromptBtn.classList.remove('btn-primary');
            saveChatPromptBtn.disabled = true;
          }
        }
        setStatus('Prompts loaded');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    function collectPayload(forceActive = false) {
      const prompt = promptEl.value.trim();
      const name = forceActive ? '' : nameEl.value.trim();
      const max_tokens = maxTokensEl.value ? Number(maxTokensEl.value) : undefined;
      const temperature = temperatureEl.value ? Number(temperatureEl.value) : undefined;
      const role = roleEl.value.trim() || undefined;
      return { prompt, name, max_tokens, temperature, role };
    }

    async function savePrompt(forceActive = false) {
      const payload = collectPayload(forceActive);
      if (!payload.prompt) {
        setStatus('Prompt text is required', 'error');
        return;
      }
      setStatus('Saving prompt...');
      try {
        const data = await api('/api/prompts', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        renderPrompts(data.prompts || []);
        setStatus('Saved', 'success');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    async function setActive(name) {
      setStatus('Setting active prompt...');
      try {
        const data = await api('/api/prompts/active', {
          method: 'POST',
          body: JSON.stringify({ name }),
        });
        renderPrompts(data.prompts || []);
        setStatus('Active prompt updated', 'success');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    async function deletePrompt(name) {
      setStatus(`Deleting ${name}...`);
      try {
        const data = await api('/api/prompts/delete', {
          method: 'POST',
          body: JSON.stringify({ name }),
        });
        renderPrompts(data.prompts || []);
        setStatus('Deleted', 'success');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    async function loadActivePromptIntoChat() {
      try {
        const data = await api('/api/prompts', { method: 'GET' });
        const prompts = data.prompts || [];
        const active = prompts.find((p) => p.isActive);
        if (active) {
          chatPromptEl.value = active.prompt || '';
          setStatus('Loaded active prompt');
          saveChatPromptBtn.disabled = true;
          saveChatPromptBtn.classList.add('btn-ghost');
          saveChatPromptBtn.classList.remove('btn-primary');
        } else {
          chatPromptEl.value = '';
          setStatus('No active prompt set', 'error');
          saveChatPromptBtn.disabled = true;
          saveChatPromptBtn.classList.add('btn-ghost');
          saveChatPromptBtn.classList.remove('btn-primary');
        }
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    function trackChatChanges() {
      if (!useActivePromptEl.checked) {
        saveChatPromptBtn.style.display = 'none';
        if (chatPromptEl.value.trim()) {
          saveChatNamedBtn.style.display = 'inline-block';
          setStatus('Prompt modified (not using active).');
        } else {
          saveChatNamedBtn.style.display = 'none';
          setStatus('Not using active prompt.');
        }
        return;
      }
      saveChatNamedBtn.style.display = 'none';
      saveChatPromptBtn.style.display = 'inline-block';
      setStatus('Modified (not saved).');
      saveChatPromptBtn.disabled = false;
      saveChatPromptBtn.classList.remove('btn-ghost');
      saveChatPromptBtn.classList.add('btn-primary');
    }

    async function saveChatPromptToActive() {
      if (!useActivePromptEl.checked) {
        setStatus('Enable "Use Active Prompt" to save.', 'error');
        return;
      }
      const prompt = chatPromptEl.value.trim();
      if (!prompt) {
        setStatus('Prompt text is required.', 'error');
        return;
      }
      try {
        const data = await api('/api/prompts', {
          method: 'POST',
          body: JSON.stringify({ prompt }),
        });
        renderPrompts(data.prompts || []);
        setStatus('Saved active prompt.', 'success');
        saveChatPromptBtn.disabled = true;
        saveChatPromptBtn.classList.add('btn-ghost');
        saveChatPromptBtn.classList.remove('btn-primary');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    async function saveChatPromptNamed() {
      const prompt = chatPromptEl.value.trim();
      if (!prompt) {
        setStatus('Prompt text is required.', 'error');
        return;
      }
      const name = window.prompt('Save prompt as:');
      if (!name) {
        setStatus('Save cancelled.', 'muted');
        return;
      }
      try {
        const data = await api('/api/prompts', {
          method: 'POST',
          body: JSON.stringify({ name, prompt }),
        });
        renderPrompts(data.prompts || []);
        setStatus(`Prompt saved as ${name}.`, 'success');
        saveChatNamedBtn.style.display = 'none';
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    document.getElementById('refresh').addEventListener('click', loadPrompts);
    document.getElementById('saveActive').addEventListener('click', () => savePrompt(true));
    document.getElementById('saveNamed').addEventListener('click', () => savePrompt(false));
    showDetailsEl.addEventListener('change', loadPrompts);

    useActivePromptEl.addEventListener('change', (e) => {
      if (e.target.checked) {
        loadActivePromptIntoChat();
        saveChatPromptBtn.style.display = 'inline-block';
      } else {
        setStatus('Not using active prompt.');
        chatPromptEl.value = '';
        saveChatPromptBtn.style.display = 'none';
        saveChatPromptBtn.disabled = true;
        saveChatPromptBtn.classList.add('btn-ghost');
        saveChatPromptBtn.classList.remove('btn-primary');
        saveChatNamedBtn.style.display = 'none';
      }
    });
    chatPromptEl.addEventListener('input', trackChatChanges);
    document.getElementById('saveChatPrompt').addEventListener('click', saveChatPromptToActive);
    document.getElementById('saveChatNamed').addEventListener('click', saveChatPromptNamed);

    toggleCliLogBtn.addEventListener('click', () => {
      showCliLog = !showCliLog;
      cliLogEl.style.display = showCliLog ? 'block' : 'none';
      cliLogEl.textContent = showCliLog ? '(no action yet)' : '';
      toggleCliLogBtn.textContent = showCliLog ? lexiPrompt : 'Show CLI Actions';
    });

    renderProviderSelector();
    fetchProvidersList();
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.content');
    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.getAttribute('data-tab');
        tabs.forEach((t) => t.classList.toggle('active', t === tab));
        contents.forEach((c) => c.classList.toggle('active', c.id === `tab-${target}`));
        if (target === 'providers') {
          fetchProvidersList();
        }
      });
    });

    loadPrompts();
  </script>
</body>
</html>
