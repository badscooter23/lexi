# OpenAI Models Configuration
default_model: gpt-4o

models:
  # GPT-4 Family
  gpt-4o:
    name: "GPT-4o"
    description: "Most capable GPT-4 model, optimized for chat and text generation"
    max_tokens: 4096
    context_window: 128000
  
  gpt-4o-mini:
    name: "GPT-4o Mini"
    description: "Faster, more cost-effective version of GPT-4o"
    max_tokens: 4096
    context_window: 128000
  
  gpt-4-turbo:
    name: "GPT-4 Turbo"
    description: "Previous generation GPT-4 model with large context window"
    max_tokens: 4096
    context_window: 128000
  
  gpt-3.5-turbo:
    name: "GPT-3.5 Turbo"
    description: "Fast and cost-effective model for most tasks"
    max_tokens: 4096
    context_window: 16385

# Common aliases for convenience
aliases:
  gpt4: gpt-4o
  gpt3: gpt-3.5-turbo
  latest: gpt-4o
  mini: gpt-4o-mini
